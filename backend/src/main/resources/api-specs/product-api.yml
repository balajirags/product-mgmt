openapi: 3.1.0
info:
  title: Product API
  description: >
    REST API for the Product domain of the Inventory Service.
    Manages product lifecycle including creation, retrieval, update,
    soft-deletion, batch operations, and associated images, options, and variants.
  version: 1.0.0
  contact:
    name: Inventory Service Team

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Products
    description: Product CRUD and batch operations

paths:
  /api/v1/products:
    post:
      tags: [Products]
      summary: Create a product
      description: >
        Creates a new product. The title is mandatory. A URL-friendly handle is
        auto-generated from the title if not provided. Status defaults to DRAFT.
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
            examples:
              minimal:
                summary: Minimal product
                value:
                  title: "Basic T-Shirt"
              full:
                summary: Full product with images, options and variants
                value:
                  title: "Classic Sneaker"
                  handle: "classic-sneaker"
                  status: "PUBLISHED"
                  description: "A timeless sneaker design"
                  subtitle: "Comfort meets style"
                  weight: 0.35
                  height: 12.0
                  width: 8.0
                  length: 30.0
                  thumbnail: "https://cdn.example.com/sneaker-thumb.jpg"
                  metadata:
                    brand: "Acme"
                    season: "SS26"
                  externalId: "EXT-001"
                  images:
                    - url: "https://cdn.example.com/sneaker-1.jpg"
                    - url: "https://cdn.example.com/sneaker-2.jpg"
                  options:
                    - title: "Size"
                      values: ["S", "M", "L"]
                    - title: "Color"
                      values: ["Red", "Blue"]
                  variants:
                    - title: "S / Red"
                      sku: "SNK-S-RED"
                      barcode: "1234567890123"
                      weight: 0.35
                      manageInventory: true
                      allowBackorder: false
                      optionValues:
                        Size: "S"
                        Color: "Red"
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Validation error (e.g. blank title, invalid image URL)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: "about:blank"
                title: "Validation Failed"
                status: 400
                detail: "Validation failed"
                instance: "/api/v1/products"
                field_errors:
                  title: "title is required"
        '409':
          description: Business rule violation (e.g. duplicate handle, invalid status)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: "about:blank"
                title: "Business Rule Violation"
                status: 409
                detail: "A product with handle 'classic-sneaker' already exists"
                instance: "/api/v1/products"
                error_code: "DUPLICATE_HANDLE"

    get:
      tags: [Products]
      summary: List products
      description: >
        Returns a paginated list of products with optional status filtering.
        Pagination uses Spring Data conventions (page, size, sort query parameters).
      operationId: listProducts
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by product status
          schema:
            $ref: '#/components/schemas/ProductStatus'
        - name: page
          in: query
          required: false
          description: Zero-based page index
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          description: Number of items per page
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: sort
          in: query
          required: false
          description: >
            Sort criteria in the format `property,direction`
            (e.g. `createdAt,desc`). Multiple sort parameters are supported.
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedProductResponse'
        '409':
          description: Business rule violation (e.g. invalid status filter value)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/products/{id}:
    get:
      tags: [Products]
      summary: Get a product by ID
      description: Retrieves a single product by its UUID, including all images, options, and variants.
      operationId: getProductById
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: "about:blank"
                title: "Invalid Parameter"
                status: 400
                detail: "Invalid value for parameter 'id'"
                instance: "/api/v1/products/not-a-uuid"
                error_code: "INVALID_PARAMETER"
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: "about:blank"
                title: "Resource Not Found"
                status: 404
                detail: "Product not found with identifier: 00000000-0000-0000-0000-000000000000"
                instance: "/api/v1/products/00000000-0000-0000-0000-000000000000"
                error_code: "PRODUCT_NOT_FOUND"

    post:
      tags: [Products]
      summary: Update a product
      description: >
        Partially updates an existing product. Only non-null fields in the
        request body are applied. Null fields are left unchanged.
      operationId: updateProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
            examples:
              updateTitle:
                summary: Update title only
                value:
                  title: "Updated Product Title"
              updateStatus:
                summary: Publish a product
                value:
                  status: "PUBLISHED"
              updateImages:
                summary: Replace images
                value:
                  images:
                    - url: "https://cdn.example.com/new-image-1.jpg"
                    - url: "https://cdn.example.com/new-image-2.jpg"
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Business rule violation (e.g. duplicate handle)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

    delete:
      tags: [Products]
      summary: Soft-delete a product
      description: >
        Soft-deletes a product by setting `deletedAt`. Cascades the soft-delete
        to all associated images, options, option values, and variants.
        The product will no longer appear in list or get operations.
      operationId: deleteProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Product deleted successfully (no content)
        '400':
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/products/batch:
    post:
      tags: [Products]
      summary: Batch product operations
      description: >
        Executes batch create, update, and delete operations in a single request.
        Operations execute in order: creates first, then updates, then deletes.
        Each operation has a maximum of 100 items. Partial failures do not roll
        back successful operations — each item result includes success/failure status.
      operationId: batchProducts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchProductRequest'
            examples:
              mixed:
                summary: Create, update, and delete in one call
                value:
                  create:
                    - title: "New Product A"
                    - title: "New Product B"
                      status: "PUBLISHED"
                  update:
                    - id: "123e4567-e89b-12d3-a456-426614174000"
                      data:
                        title: "Updated Title"
                  delete:
                    - "223e4567-e89b-12d3-a456-426614174000"
      responses:
        '200':
          description: Batch results with per-item status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchProductResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  parameters:
    ProductId:
      name: id
      in: path
      required: true
      description: Product UUID
      schema:
        type: string
        format: uuid

  schemas:
    # ───────────────────── Enums ─────────────────────

    ProductStatus:
      type: string
      enum: [DRAFT, PUBLISHED, PROPOSED, REJECTED]
      description: |
        * `DRAFT` — Initial state when a product is created
        * `PUBLISHED` — Product is live and visible
        * `PROPOSED` — Product has been proposed (workflow state)
        * `REJECTED` — Product was rejected

    # ───────────────────── Request DTOs ─────────────────────

    CreateProductRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          description: Product title (required, must not be blank)
          example: "Classic Sneaker"
        handle:
          type: string
          nullable: true
          description: URL-friendly slug. Auto-generated from title if omitted. Must be unique.
          example: "classic-sneaker"
        status:
          $ref: '#/components/schemas/ProductStatus'
        description:
          type: string
          nullable: true
          description: Full product description
        subtitle:
          type: string
          nullable: true
          description: Short subtitle
        weight:
          type: number
          format: decimal
          nullable: true
        height:
          type: number
          format: decimal
          nullable: true
        width:
          type: number
          format: decimal
          nullable: true
        length:
          type: number
          format: decimal
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Arbitrary key-value metadata (max 65 536 bytes when serialised)
        externalId:
          type: string
          nullable: true
          description: Identifier in an external system
        thumbnail:
          type: string
          nullable: true
          description: URL of the product thumbnail image
          example: "https://cdn.example.com/thumb.jpg"
        images:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ProductImageRequest'
          description: Gallery images. Rank is assigned by array position (0-based).
        options:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ProductOptionRequest'
          description: Product options (e.g. Size, Color)
        variants:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ProductVariantRequest'
          description: Product variants combining option values

    UpdateProductRequest:
      type: object
      description: >
        Partial update request. Only non-null fields are applied to the product.
        Null or absent fields are left unchanged.
      properties:
        title:
          type: string
          minLength: 1
          nullable: true
          description: New title (must not be blank if provided)
        handle:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProductStatus'
        description:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        weight:
          type: number
          format: decimal
          nullable: true
        height:
          type: number
          format: decimal
          nullable: true
        width:
          type: number
          format: decimal
          nullable: true
        length:
          type: number
          format: decimal
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        externalId:
          type: string
          nullable: true
        thumbnail:
          type: string
          nullable: true
        images:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ProductImageRequest'
        options:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ProductOptionRequest'
        variants:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ProductVariantRequest'

    ProductImageRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          minLength: 1
          description: Image URL (required, must not be blank)
          example: "https://cdn.example.com/product-1.jpg"

    ProductOptionRequest:
      type: object
      required: [title, values]
      properties:
        title:
          type: string
          minLength: 1
          description: Option name (e.g. "Size", "Color")
          example: "Size"
        values:
          type: array
          minItems: 1
          items:
            type: string
          description: At least one option value required
          example: ["S", "M", "L", "XL"]

    ProductVariantRequest:
      type: object
      properties:
        title:
          type: string
          nullable: true
          description: Variant label (e.g. "S / Red"). Auto-generated from option values if omitted.
        sku:
          type: string
          nullable: true
          description: Stock Keeping Unit (must be unique across all variants)
          example: "SNK-S-RED-001"
        barcode:
          type: string
          nullable: true
          description: Barcode (must be unique across all variants)
          example: "1234567890123"
        weight:
          type: number
          format: decimal
          nullable: true
        height:
          type: number
          format: decimal
          nullable: true
        width:
          type: number
          format: decimal
          nullable: true
        length:
          type: number
          format: decimal
          nullable: true
        manageInventory:
          type: boolean
          default: false
          description: Whether inventory is tracked for this variant
        allowBackorder:
          type: boolean
          default: false
          description: Whether orders are accepted when stock is zero
        optionValues:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Map of option title to selected value
          example:
            Size: "S"
            Color: "Red"

    BatchProductRequest:
      type: object
      description: >
        Batch request containing up to 100 items per operation type.
        All three arrays are optional — include only the operations needed.
      properties:
        create:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/CreateProductRequest'
          description: Products to create
        update:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/BatchUpdateItem'
          description: Products to update
        delete:
          type: array
          maxItems: 100
          items:
            type: string
            format: uuid
          description: Product IDs to soft-delete

    BatchUpdateItem:
      type: object
      required: [id, data]
      properties:
        id:
          type: string
          format: uuid
          description: Product UUID to update
        data:
          $ref: '#/components/schemas/UpdateProductRequest'

    # ───────────────────── Response DTOs ─────────────────────

    ProductResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        handle:
          type: string
        status:
          $ref: '#/components/schemas/ProductStatus'
        description:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        giftcard:
          type: boolean
        discountable:
          type: boolean
        weight:
          type: number
          format: decimal
          nullable: true
        height:
          type: number
          format: decimal
          nullable: true
        width:
          type: number
          format: decimal
          nullable: true
        length:
          type: number
          format: decimal
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        externalId:
          type: string
          nullable: true
        thumbnail:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        images:
          type: array
          items:
            $ref: '#/components/schemas/ProductImageResponse'
        options:
          type: array
          items:
            $ref: '#/components/schemas/ProductOptionResponse'
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariantResponse'

    ProductImageResponse:
      type: object
      properties:
        url:
          type: string
          example: "https://cdn.example.com/product-1.jpg"
        rank:
          type: integer
          description: Display position (0-based)
          example: 0

    ProductOptionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "Size"
        values:
          type: array
          items:
            type: string
          example: ["S", "M", "L"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductVariantResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "S / Red"
        sku:
          type: string
          nullable: true
          example: "SNK-S-RED-001"
        barcode:
          type: string
          nullable: true
          example: "1234567890123"
        weight:
          type: number
          format: decimal
          nullable: true
        height:
          type: number
          format: decimal
          nullable: true
        width:
          type: number
          format: decimal
          nullable: true
        length:
          type: number
          format: decimal
          nullable: true
        manageInventory:
          type: boolean
        allowBackorder:
          type: boolean
        optionValues:
          type: object
          additionalProperties:
            type: string
          example:
            Size: "S"
            Color: "Red"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PagedProductResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
        page:
          type: integer
          description: Current zero-based page index
          example: 0
        size:
          type: integer
          description: Items per page
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Total items across all pages
          example: 42
        totalPages:
          type: integer
          description: Total number of pages
          example: 3

    BatchProductResponse:
      type: object
      properties:
        created:
          type: array
          items:
            $ref: '#/components/schemas/BatchItemResult'
        updated:
          type: array
          items:
            $ref: '#/components/schemas/BatchItemResult'
        deleted:
          type: array
          items:
            $ref: '#/components/schemas/BatchItemResult'

    BatchItemResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Product ID (null when a create operation fails)
        success:
          type: boolean
        product:
          $ref: '#/components/schemas/ProductResponse'
          description: Present only on successful create/update; null on delete or failure
        errorCode:
          type: string
          nullable: true
          description: Present only on failure
        errorMessage:
          type: string
          nullable: true
          description: Present only on failure

    # ───────────────────── Error ─────────────────────

    ProblemDetail:
      type: object
      description: RFC 7807 Problem Detail response
      properties:
        type:
          type: string
          default: "about:blank"
        title:
          type: string
          example: "Validation Failed"
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "title is required"
        instance:
          type: string
          description: The request path that produced the error
          example: "/api/v1/products"
        error_code:
          type: string
          nullable: true
          description: Domain-specific error code
          example: "DUPLICATE_HANDLE"
        field_errors:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Field-level validation errors (field name → message)
          example:
            title: "title is required"
