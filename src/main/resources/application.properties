spring.application.name=demo

# Weather API configuration
# API key must be provided via the WEATHER_API_KEY environment variable
weather.api-key=${WEATHER_API_KEY}
weather.base-url=https://api.openweathermap.org
weather.connect-timeout-ms=5000
weather.read-timeout-ms=5000

# Datasource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/inventory}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3